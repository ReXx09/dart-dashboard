services:
  dart-dashboard:
    image: ghcr.io/rexx09/loewen-dart-dashboard:latest
    container_name: dart-dashboard
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FIRESTICK_IP=${FIRESTICK_IP:-192.168.8.177}
      - SERVER_IP=${SERVER_IP:-}
