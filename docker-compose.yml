services:
  dart-dashboard:
    build: .
    container_name: dart-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Einstellungen & Kacheln bleiben auch nach Container-Updates erhalten.
      # Auf Unraid: /mnt/user/appdata/dart-dashboard/data
      # Lokal (PC/Dev): ./data
      - ${DATA_PATH:-./data}:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FIRESTICK_IP=${FIRESTICK_IP:-192.168.8.177}
