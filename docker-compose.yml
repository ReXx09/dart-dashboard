services:
  dart-dashboard:
    build: .
    container_name: dart-dashboard
    restart: unless-stopped
    ports:
      - "3100:3000"
    group_add:
      - dialout
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVER_IP=${SERVER_IP:-}
      - ARDUINO_REQUIRE_THROW_TRIGGER=false