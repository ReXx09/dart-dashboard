services:
  dart-dashboard:
    build: .
    container_name: dart-dashboard
    restart: unless-stopped
    ports:
      - "3100:3000"
    group_add:
      - dialout
    devices:
      - /dev/serial/by-id/usb-Arduino__www.arduino.cc__0042_1453230323235141E0C2-if00:/dev/ttyACM0
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVER_IP=${SERVER_IP:-}
      - ARDUINO_REQUIRE_THROW_TRIGGER=false
      - ARDUINO_AUTO_THROW_MATRIX_ENABLED=true
      - ARDUINO_MATRIX_RAW_ENABLED=true
      - MATRIX_EVT_PAIR_MAX_SKEW_MS=220
      - MATRIX_HIT_CLUSTER_WINDOW_MS=70
      - MATRIX_HIT_SUPPRESS_MS=90
      - MATRIX_HIT_REFRACTORY_MS=260
      - MATRIX_SAME_KEY_GUARD_MS=130
      - ARDUINO_MATRIX_THROW_LOCK_MS=220