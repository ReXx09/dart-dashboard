<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Live-Spielstand</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f1f1f1;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .topbar {
      background: #111;
      border-bottom: 3px solid #e63946;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .topbar a { color: #888; text-decoration: none; font-size: .85rem; }
    .topbar a:hover { color: #fff; }
    .topbar h2 { font-size: 1.1rem; flex: 1; font-weight: 700; }
    .live-badge { background: #e63946; color: #fff; font-size: .65rem; padding: 3px 10px; border-radius: 20px; font-weight: 700; letter-spacing: .5px; }
    .header-status { font-size: .75rem; color: #555; }
    .header-status span { color: #2a9d8f; }
    .header-controls { display: flex; gap: 6px; align-items: center; }
    .header-controls select { background: #0d0d0d; border: 1px solid #2a2a2a; color: #f1f1f1; padding: 5px 8px; border-radius: 6px; font-size: .78rem; font-family: inherit; cursor: pointer; }
    .btn-icon {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .78rem;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .btn-icon:hover { background: #252525; color: #fff; }
    .btn-icon.primary { background: #e6394622; border-color: #e63946; color: #e63946; }
    .btn-icon.primary:hover { background: #e6394633; }
    .btn-icon.danger { background: #e6394611; border-color: #e6394644; color: #e63946; }
    .btn-icon.danger:hover { background: #e6394622; }
    .btn-icon:disabled { opacity: .3; cursor: default; }
    main { padding: 16px; max-width: 1600px; margin: 0 auto; display: grid; gap: 14px; }
    .focus-player { display: grid; grid-template-columns: 1.45fr .75fr; gap: 14px; }
    .focus-card { background: linear-gradient(135deg, #191111, #141414); border-radius: 18px; padding: 20px; border: 2px solid var(--pc, #e63946); box-shadow: 0 0 45px rgba(230,57,70,.16); position: relative; overflow: hidden; }
    .focus-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 10%, var(--pc-glow, rgba(230,57,70,.18)), transparent 35%); pointer-events: none; }
    .focus-card > * { position: relative; }
    .focus-head { display: grid; grid-template-columns: minmax(0, 1fr) 260px; gap: 10px; align-items: start; margin-bottom: 12px; }
    .focus-title { min-width: 0; }
    .focus-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .focus-meta { color: #777; font-size: .8rem; margin-bottom: 14px; }
    .focus-leg-tile { background: #101010; border: 1px solid #272727; border-radius: 12px; padding: 10px; min-height: 96px; display: flex; flex-direction: column; }
    .focus-leg-tile h4 { color: #777; font-size: .68rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; text-align: center; }
    .focus-kacheln { display: grid; grid-template-columns: 1.25fr 1fr 1fr; gap: 12px; }
    .focus-kachel { background: #0f0f0f; border: 1px solid #262626; border-radius: 16px; padding: 16px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .focus-kachel h4 { color: #777; font-size: .68rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .focus-kachel .subline { color: #555; font-size: .72rem; margin-top: 6px; }
    .leg-list { width: 100%; display: grid; gap: 6px; max-height: 110px; overflow: auto; }
    .leg-item { display: flex; justify-content: space-between; align-items: center; background: #1b1b1b; border: 1px solid #2b2b2b; border-radius: 8px; padding: 6px 8px; font-size: .74rem; }
    .leg-item .idx { color: #777; }
    .leg-item .score { color: #f4a261; font-weight: 700; font-variant-numeric: tabular-nums; }
    .throw-segments { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .throw-seg { background: #1b1b1b; border: 1px solid #2b2b2b; border-radius: 12px; min-height: 74px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 800; }
    .throw-seg .seg { font-size: 1.55rem; color: var(--pc, #e63946); }
    .throw-seg .pts { font-size: .78rem; color: #555; margin-top: 4px; }
    .focus-big-score { font-size: 5rem; font-weight: 900; line-height: 1; color: var(--pc, #f4a261); font-variant-numeric: tabular-nums; }
    .focus-summary { margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .focus-summary div { background: #141414; border-radius: 10px; padding: 10px; text-align: center; }
    .focus-summary span { display: block; color: #666; font-size: .66rem; text-transform: uppercase; letter-spacing: 1px; }
    .focus-summary strong { display: block; color: #f1f1f1; font-size: 1.05rem; margin-top: 2px; }
    .compact-players { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    .score-card {
      background: #141414;
      border-radius: 14px;
      padding: 18px;
      border: 2px solid #1e1e1e;
      position: relative;
      transition: all .3s ease;
      overflow: hidden;
    }
    .score-card.active {
      border-color: var(--pc, #e63946);
      box-shadow: 0 0 30px rgba(230, 57, 70, .15);
      background: #191111;
    }
    .score-card.active::after {
      content: 'AKTIV';
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--pc, #e63946);
      background: rgba(230,57,70,.15);
      padding: 2px 8px;
      border-radius: 10px;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(230,57,70,.1); }
      50% { box-shadow: 0 0 40px rgba(230,57,70,.25); }
    }
    .score-card.active { animation: pulseGlow 2s ease-in-out infinite; }
    .sc-color-bar { width: 100%; height: 3px; background: var(--pc, #e63946); border-radius: 3px; margin-bottom: 12px; }
    .sc-name { font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
    .sc-score { font-size: 3.6rem; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; color: var(--pc, #f4a261); margin-bottom: 6px; }
    .sc-stats { font-size: .78rem; color: #666; line-height: 1.6; }
    .sc-stats span { color: #aaa; font-weight: 600; }
    .sc-last-throws { margin-top: 10px; display: flex; gap: 4px; }
    .sc-throw-chip { background: #1e1e1e; border-radius: 6px; padding: 4px 8px; font-size: .78rem; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 28px; text-align: center; }
    .sc-throw-chip.empty { color: #333; }
    .sc-throw-chip.bust { color: #e63946; background: #2a0a0a; }
    .sc-average { margin-top: 8px; font-size: .7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .sc-average strong { color: #f4a261; font-size: .9rem; }
    .sc-legs { position: absolute; bottom: 10px; right: 14px; font-size: .7rem; color: #444; }
    .sc-legs strong { color: #888; }
    .status-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .status-panel { background: #141414; border-radius: 12px; border: 1px solid #1e1e1e; padding: 12px; }
    .status-panel h4 { font-size: .68rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
    .status-panel .value { font-size: .85rem; color: #ddd; font-family: Consolas, monospace; }
    .status-panel .value.muted { color: #555; }
    .arduino-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .arduino-dot.on { background: #2a9d8f; box-shadow: 0 0 10px rgba(42,157,143,.6); }
    .arduino-dot.off { background: #555; }
    /* Cricket-Grid */
    .cricket-grid { display: grid; gap: 6px; margin-top: 8px; }
    .cricket-grid.horizontal { grid-template-columns: repeat(7, 1fr); }
    .cricket-grid .c-num { text-align: center; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px; padding: 6px; }
    .cricket-grid .c-num .num { font-size: .85rem; font-weight: 700; color: #f1f1f1; }
    .cricket-grid .c-num .hits { font-size: .7rem; color: #555; }
    .cricket-grid .c-num.closed { border-color: #2a9d8f; background: #0d1a1a; }
    .cricket-grid .c-num.closed .num { color: #2a9d8f; }
    .hs-panel { background: #141414; border-radius: 12px; border: 1px solid #1e1e1e; padding: 12px; }
    .hs-panel h4 { font-size: .68rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .hs-table { width: 100%; border-collapse: collapse; }
    .hs-table th { text-align: left; font-size: .65rem; color: #444; text-transform: uppercase; padding: 4px 6px; border-bottom: 1px solid #1e1e1e; }
    .hs-table td { padding: 4px 6px; font-size: .8rem; border-bottom: 1px solid #1a1a1a; }
    .hs-table tr:last-child td { border-bottom: none; }
    .hs-table .rank { color: #555; font-weight: 600; }
    .hs-table .name { color: #ddd; }
    .hs-table .score { color: #f4a261; font-weight: 700; text-align: right; }
    .hs-table .when { color: #444; text-align: right; font-size: .7rem; }
    .hs-muted { color: #444; font-style: italic; font-size: .78rem; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e1e1e; border: 1px solid #333; color: #f1f1f1; padding: 10px 24px; border-radius: 8px; font-size: .88rem; opacity: 0; transition: all .3s; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 768px) {
      .scoreboard { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr; }
      .sc-score { font-size: 3rem; }
    }

    @media (max-height: 900px) and (min-width: 900px) {
      .topbar { padding: 8px 14px; gap: 8px; }
      .topbar h2 { font-size: 1rem; }
      .header-status { font-size: .68rem; }
      .header-controls select { padding: 4px 7px; font-size: .72rem; }
      .btn-icon { padding: 5px 9px; font-size: .72rem; }

      main { padding: 10px; gap: 8px; }
      .focus-player { gap: 8px; }
      .focus-card { padding: 14px; border-radius: 14px; }
      .focus-head { grid-template-columns: minmax(0, 1fr) 210px; gap: 8px; margin-bottom: 8px; }
      .focus-name { font-size: 1.15rem; }
      .focus-meta { font-size: .72rem; margin-bottom: 0; }
      .focus-leg-tile { min-height: 82px; padding: 8px; border-radius: 10px; }
      .focus-kacheln { gap: 8px; grid-template-columns: 1.1fr 1fr 1fr; }
      .focus-kachel { min-height: 116px; padding: 10px; border-radius: 12px; }
      .throw-seg { min-height: 58px; }
      .throw-seg .seg { font-size: 1.2rem; }
      .focus-big-score { font-size: 3.35rem; }
      .focus-summary { margin-top: 8px; }
      .focus-summary strong { font-size: .95rem; }
      .leg-list { max-height: 84px; }

      .compact-players { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 6px; }
      .score-card { padding: 12px; border-radius: 11px; }
      .sc-name { font-size: .86rem; }
      .sc-score { font-size: 2.45rem; }
      .sc-stats { font-size: .7rem; line-height: 1.45; }
      .sc-last-throws { margin-top: 6px; }
      .sc-throw-chip { padding: 3px 6px; font-size: .72rem; }

      .status-grid { gap: 6px; }
      .status-panel { padding: 8px; }
      .status-panel .value { font-size: .76rem; }
      .hs-panel { padding: 8px; }
      .hs-panel h4 { margin-bottom: 6px; }
      .hs-table th { padding: 3px 4px; }
      .hs-table td { padding: 3px 4px; }
    }

    @media (max-height: 780px) and (min-width: 900px) {
      main {
        max-height: calc(100vh - 58px);
        overflow-y: auto;
        padding-right: 6px;
      }

      .focus-kacheln { grid-template-columns: 1fr 1fr 1fr; }
      .focus-head { grid-template-columns: 1fr; }
      .focus-leg-tile { min-height: 64px; }
      .leg-list { max-height: 42px; }
      .focus-big-score { font-size: 2.9rem; }

      .compact-players { grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); }
      .sc-score { font-size: 2rem; }
      .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">← Zurück</a>
    <h2>🎯 Live-Spielstand</h2>
    <span class="live-badge">LIVE</span>
    <div class="header-status">SSE: <span id="sseStatus">verbunden</span></div>
    <div class="header-controls">
      <select id="gameModeSelect" onchange="changeMode(this.value)">
        <option value="501">501</option>
        <option value="301">301</option>
        <option value="701">701</option>
        <option value="cricket">Cricket</option>
        <option value="shanghai">Shanghai</option>
        <option value="atc">Around the Clock</option>
        <option value="split">Split</option>
      </select>
      <button class="btn-icon" onclick="undoLast()" id="undoBtn" title="Letzten Wurf rückgängig">↩ Undo</button>
      <button class="btn-icon" onclick="nextPlayer()" id="nextBtn" title="Nächster Spieler">⏭ Next</button>
      <button class="btn-icon primary" onclick="resetLeg(true)">Neues Leg</button>
      <button class="btn-icon danger" onclick="resetLeg(false)">Reset</button>
    </div>
  </div>
  <main>
    <section class="focus-player" id="focusPlayer"><div style="text-align:center;padding:40px;color:#555">Lade Spieler...</div></section>
    <section class="compact-players" id="compactPlayers"></section>
    <div class="status-grid">
      <div class="status-panel">
        <h4>Arduino</h4>
        <div class="value" id="arduinoState"><span class="arduino-dot off"></span>Nicht verbunden</div>
      </div>
      <div class="status-panel">
        <h4>Matrix-Hit</h4>
        <div class="value muted" id="matrixHitState">-</div>
      </div>
      <div class="status-panel">
        <h4>Auto-Wurf</h4>
        <div class="value muted" id="autoThrowState">-</div>
      </div>
      <div class="status-panel">
        <h4>Letzte Aktion</h4>
        <div class="value muted" id="lastAction">Keine Aktion</div>
      </div>
    </div>
    <div class="hs-panel">
      <h4>🏆 Highscores</h4>
      <table class="hs-table">
        <thead><tr><th>#</th><th>Spieler</th><th>Score</th><th>Typ</th><th>Zeit</th></tr></thead>
        <tbody id="highscoreBody"><tr><td colspan="5" class="hs-muted">Keine Einträge</td></tr></tbody>
      </table>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    let liveState = null;

    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escapeAttr(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function describeMatrixHit(hit) {
      if (!hit) return '-';
      const parts = [hit.row || '-', hit.column || '-'];
      if (typeof hit.points === 'number') parts.push('Wert ' + String(hit.points));
      if (typeof hit.code === 'number' && hit.code > 0) parts.push('Code ' + hit.code);
      if (hit.label) parts.push(hit.label);
      return parts.join(' | ');
    }
    function describeAutoThrow(result) {
      if (!result) return '-';
      if (result.ok === false) return 'Fehler: ' + (result.reason || 'unbekannt');
      const pieces = [];
      if (typeof result.value === 'number') pieces.push(result.value + ' P');
      if (result.player) pieces.push(result.player);
      if (result.hit && result.hit.row && result.hit.column) pieces.push(result.hit.row + '/' + result.hit.column);
      if (result.channel) pieces.push('CH' + result.channel);
      return pieces.join(' | ') || '-';
    }

    // ── Arduino-Direktstatus von /api/arduino/state (unabhängig vom Live-State) ──
    async function refreshArduinoStatus() {
      try {
        const r = await fetch('/api/arduino/state', { signal: AbortSignal.timeout(3000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const state = await r.json();
        const el = document.getElementById('arduinoState');
        const connection = state.connection || state;
        const matrix = state.matrix || {};
        const telemetry = state.telemetry || state;
        const hitLabel = matrix.label || (matrix.hit && matrix.hit.label) || '-';
        if (connection.connected) {
          el.innerHTML = '<span class="arduino-dot on"></span>Verbunden | active=' + (telemetry.activeCount || 0) + ' | Hit ' + hitLabel;
        } else {
          el.innerHTML = '<span class="arduino-dot off"></span>' + (connection.error || 'Nicht verbunden');
        }
      } catch { /* still zeigen was im live-state steht */ }
    }
    // SSE für Arduino-Echtzeit-Updates
    (function() {
      const sse = new EventSource('/api/arduino/events');
      sse.addEventListener('state', function(evt) {
        try {
          const state = JSON.parse(evt.data);
          const el = document.getElementById('arduinoState');
          const connection = state.connection || state;
          const matrix = state.matrix || {};
          const telemetry = state.telemetry || state;
          const hitLabel = matrix.label || (matrix.hit && matrix.hit.label) || '-';
          if (connection.connected) {
            el.innerHTML = '<span class="arduino-dot on"></span>Verbunden | active=' + (telemetry.activeCount || 0) + ' | Hit ' + hitLabel
          } else {
            el.innerHTML = '<span class="arduino-dot off"></span>' + (connection.error || 'Nicht verbunden')
          }
        } catch(e) {}
      });
    })();

    // ── SSE für Live-Reload ──
    (function() {
      const sse = new EventSource('/api/events');
      let reloadQueued = false;
      sse.addEventListener('reload', () => {
        if (reloadQueued) return;
        reloadQueued = true;
        setTimeout(() => {
          reloadQueued = false;
          loadAll().catch(() => {
            document.getElementById('sseStatus').textContent = 'getrennt';
          });
        }, 120);
      });
      sse.addEventListener('error', () => { document.getElementById('sseStatus').textContent = 'getrennt'; });
    })();

    loadAll();
    refreshArduinoStatus();
    setInterval(refreshArduinoStatus, 5000);

    async function loadAll() {
      let state, highscores;
      try {
        const stateRes = await fetch('/api/live/state');
        if (!stateRes.ok) throw new Error('HTTP ' + stateRes.status);
        state = await stateRes.json();
        liveState = state;
      } catch(e) {
        document.getElementById('focusPlayer').innerHTML = '<div style="text-align:center;padding:40px;color:#e63946">⚠️ Live-State API nicht erreichbar</div>';
        document.getElementById('sseStatus').textContent = 'Error';
        return;
      }
      try {
        const hsRes = await fetch('/api/highscores');
        if (hsRes.ok) highscores = await hsRes.json();
      } catch { highscores = []; }

      renderState(state);
      renderHighscores(highscores);
      document.getElementById('sseStatus').textContent = 'verbunden';
    }
    function renderState(state) {
      if (!state || !Array.isArray(state.players) || state.players.length === 0) return;
      const activePlayer = state.game.activePlayer || 0;
      const mode = state.game.mode || '501';
      const sel = document.getElementById('gameModeSelect');
      if (sel.value !== mode) sel.value = mode;
      const active = state.players[activePlayer];
      const focusPlayer = document.getElementById('focusPlayer');
      const compactPlayers = document.getElementById('compactPlayers');

      const isCricket = mode === 'cricket';
      const compactOrder = [...state.players]
        .filter((_p, idx) => idx !== activePlayer)
        .sort((a, b) => (Number(a.legs || 0) - Number(b.legs || 0)) || (Number(a.remaining || 0) - Number(b.remaining || 0)) || (Number(a.slot || 0) - Number(b.slot || 0)));

      if (isCricket) {
        focusPlayer.innerHTML = renderCricketView(active, state);
      } else {
        focusPlayer.innerHTML = renderFocusPlayer(active, activePlayer, state);
      }
      compactPlayers.innerHTML = compactOrder
        .map((p, idx) => renderCompactPlayer(p, idx, state.players.findIndex(sp => sp.slot === p.slot), mode)).join('');

      const arduino = state.arduino || {};
      const connection = arduino.connection || arduino;
      const matrix = arduino.matrix || {};
      const telemetry = arduino.telemetry || arduino;
      const automation = arduino.automation || arduino;
      document.getElementById('arduinoState').innerHTML = connection.connected
        ? '<span class="arduino-dot on"></span>Verbunden | active=' + (telemetry.activeCount || 0)
        : '<span class="arduino-dot off"></span>Nicht verbunden';
      document.getElementById('matrixHitState').textContent = describeMatrixHit(matrix.hit || matrix.sniffer || null);
      document.getElementById('autoThrowState').textContent = describeAutoThrow(automation.lastAutoThrow || null);
      const action = state.lastAction;
      document.getElementById('lastAction').innerHTML = action
        ? escapeHtml(action.player || '-') + ' → ' + (action.points ?? '-') + (action.source ? ' [' + action.source + ']' : '') + (action.bust ? ' (BUST)' : '') + (action.type === 'undo' ? ' (UNDO)' : '') + (action.type === 'next-player' ? ' (NEXT)' : '')
        : 'Keine Aktion';
    }
    function renderCricketView(p, state) {
      if (!p) return '';
      const activeIdx = state.game.activePlayer || 0;
      const throws = Array.isArray(p.throws) ? p.throws : [];
      const lastThrows = throws.slice(-3);
      const cricketHits = p.cricketHits || {};
      const cricketClosed = p.cricketClosed || {};
      const nums = [15,16,17,18,19,20,25];
      const gridHtml = nums.map(n => {
        const hits = cricketHits[n] || 0;
        const closed = !!cricketClosed[n];
        return '<div class="c-num' + (closed ? ' closed' : '') + '"><div class="num">' + n + '</div><div class="hits">' + (closed ? '✔' : hits + '/3') + '</div></div>';
      }).join('');

      return '<div class="focus-card" style="--pc:' + escapeAttr(p.color || '#e63946') + ';--pc-glow:' + colorToRgba(p.color || '#e63946', .18) + '">' +
        '<div class="focus-name">🎯 ' + escapeHtml(p.name) + ' · Cricket</div>' +
        '<div class="focus-meta">Spieler ' + p.slot + ' wirft gerade &bull; Runde ' + (state.game.throwRound || 1) + ' &bull; Wurf ' + ((state.game.currentThrow || 0) + 1) + ' von 3</div>' +
        '<div class="focus-kacheln" style="grid-template-columns:1fr 1fr">' +
          '<div class="focus-kachel"><h4>Zahlen</h4><div class="cricket-grid horizontal">' + gridHtml + '</div></div>' +
          '<div class="focus-kachel"><h4>Letzte Würfe</h4><div class="throw-segments">' + lastThrows.map(t => '<div class="throw-seg" style="--pc:' + escapeAttr(p.color || '#e63946') + '"><div class="seg">' + (t.points || 0) + '</div></div>').join('') + '</div></div>' +
        '</div>' +
        '<div class="focus-summary"><div><span>Turns</span><strong>' + (p.turns || 0) + '</strong></div><div><span>Punkte</span><strong>' + (p.totalScored || 0) + '</strong></div><div><span>Ø 3-Dart</span><strong>' + ((p.average || 0) > 0 ? Number(p.average).toFixed(1) : '-') + '</strong></div></div>' +
      '</div>';
    }
    function renderFocusPlayer(p, idx, state) {
      if (!p) return '';
      const currentRound = Array.isArray(p.currentRoundPoints) ? p.currentRoundPoints : [];
      const throws = Array.isArray(p.throws) ? p.throws : [];
      const lastThrows = throws.slice(-3);
      const displayThrows = currentRound.length >= 1 ? [...currentRound] : lastThrows.map(t => t.points);
      while (displayThrows.length < 3) displayThrows.push(null);
      const avgStr = (p.average || 0) > 0 ? Number(p.average || 0).toFixed(1) : '-';
      const totalScored = p.totalScored || 0;
      const currentRoundScore = displayThrows.reduce((sum, pt) => sum + (pt === null ? 0 : (Number(pt) || 0)), 0);
      const legScore = p.throws.reduce((sum, t) => sum + (Number(t.points) || 0), 0);
      const turnScores = [];
      for (let i = 0; i < throws.length; i += 3) {
        const chunk = throws.slice(i, i + 3);
        const score = chunk.reduce((sum, t) => sum + (Number(t.points) || 0), 0);
        turnScores.push(score);
      }

      const legListHtml = turnScores.length
        ? turnScores.slice(-12).reverse().map((score, orderIdx) => {
            const legIdx = turnScores.length - orderIdx;
            return '<div class="leg-item"><span class="idx">Leg ' + legIdx + '</span><span class="score">' + score + '</span></div>';
          }).join('')
        : '<div class="subline">Noch keine Legs erfasst</div>';

      const throwsHtml = displayThrows.map((pt, ti) => {
        const label = pt === null ? '-' : String(pt);
        const pointsLabel = pt === null ? 'offen' : (pt === 0 ? '0' : '+' + pt);
        return '<div class="throw-seg" style="--pc:' + escapeAttr(p.color || '#f4a261') + '">' +
          '<div class="seg">' + label + '</div>' +
          '<div class="pts">' + pointsLabel + '</div>' +
        '</div>';
      }).join('');

      return '<div class="focus-card" style="--pc:' + escapeAttr(p.color || '#f4a261') + ';--pc-glow:' + colorToRgba(p.color || '#e63946', .18) + '">' +
        '<div class="focus-head">' +
          '<div class="focus-title">' +
            '<div class="focus-name">🎯 ' + escapeHtml(p.name) + '</div>' +
            '<div class="focus-meta">Spieler ' + p.slot + ' wirft gerade &bull; Runde ' + (state.game.throwRound || 1) + ' &bull; Wurf ' + ((state.game.currentThrow || 0) + 1) + ' von 3</div>' +
          '</div>' +
          '<div class="focus-leg-tile">' +
            '<h4>Leg-Liste</h4>' +
            '<div class="leg-list">' + legListHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="focus-kacheln">' +
          '<div class="focus-kachel">' +
            '<h4>Aktuelle Würfe / Zahlen</h4>' +
            '<div class="throw-segments">' + throwsHtml + '</div>' +
            '<div class="subline">Runden-Punkte: <strong>' + currentRoundScore + '</strong></div>' +
          '</div>' +
          '<div class="focus-kachel">' +
            '<h4>Geworfene Punkte / Leg</h4>' +
            '<div class="focus-big-score" style="font-size:4.2rem">' + legScore + '</div>' +
            '<div style="color:#777;font-size:.82rem">Fortlaufend im Leg</div>' +
          '</div>' +
          '<div class="focus-kachel">' +
            '<h4>Gesamt / Rest</h4>' +
            '<div class="focus-big-score">' + p.remaining + '</div>' +
            '<div style="color:#777;font-size:.82rem">Restpunkte</div>' +
          '</div>' +
        '</div>' +
        '<div class="focus-summary">' +
          '<div><span>Turns</span><strong>' + (p.turns || 0) + '</strong></div>' +
          '<div><span>Gesamt Punkte</span><strong>' + totalScored + '</strong></div>' +
          '<div><span>Ø 3-Dart</span><strong>' + avgStr + '</strong></div>' +
        '</div>' +
      '</div>';
    }

    function renderCompactPlayer(p, displayIdx, stateIdx, mode) {
      const currentRound = Array.isArray(p.currentRoundPoints) ? p.currentRoundPoints : [];
      const lastThrows = Array.isArray(p.throws) ? p.throws.slice(-3).map(t => t.points) : [];
      const displayThrows = currentRound.length >= 1 ? [...currentRound] : lastThrows;
      while (displayThrows.length < 3) displayThrows.push('-');
      const avgStr = (p.average || 0) > 0 ? Number(p.average || 0).toFixed(1) : '-';

      const isCricket = mode === 'cricket';
      const displayScore = isCricket ? (p.totalScored || 0) : p.remaining;
      const scoreLabel = isCricket ? 'Punkte' : 'Rest';
      const cricketInfo = isCricket ? ' | Treffer: ' + Object.values(p.cricketHits || {}).reduce((a,b) => a + (b||0), 0) : '';

      return '<div class="score-card" style="--pc:' + escapeAttr(p.color || '#f4a261') + '">' +
        '<div class="sc-color-bar"></div>' +
        '<div class="sc-name">P' + p.slot + ' · ' + escapeHtml(p.name) + '</div>' +
        '<div class="sc-score">' + displayScore + '</div>' +
        '<div class="sc-stats">' + scoreLabel + ': <span>' + displayScore + '</span> | Ø: <span>' + avgStr + '</span> | Legs: <span>' + (p.legs || 0) + '</span>' + cricketInfo + '</div>' +
        '<div class="sc-last-throws">' + displayThrows.map((pt) => '<span class="sc-throw-chip' + (pt === '-' ? ' empty' : '') + '">' + pt + '</span>').join('') + '</div>' +
      '</div>';
    }

    function colorToRgba(hex, alpha) {
      const clean = String(hex || '#e63946').replace('#', '');
      if (clean.length !== 6) return 'rgba(230,57,70,' + alpha + ')';
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    // ── Toast ──
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' err' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    // ── Highscores ──
    function renderHighscores(list) {
      const tbody = document.getElementById('highscoreBody');
      if (!Array.isArray(list) || list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="hs-muted">Keine Einträge</td></tr>';
        return;
      }
      tbody.innerHTML = list.slice(0, 20).map(function(entry, idx) {
        var d = entry.ts ? new Date(entry.ts) : null;
        var timeStr = d ? d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : '-';
        return '<tr><td class="rank">' + (idx + 1) + '</td><td class="name">' + escapeHtml(entry.player) + '</td><td class="score">' + entry.score + '</td><td>' + (entry.kind || '-') + '</td><td class="when">' + timeStr + '</td></tr>';
      }).join('');
    }

    // ── Undo ──
    async function undoLast() {
      try {
        var r = await fetch('/api/live/undo', { method: 'POST' });
        if (!r.ok) { showToast('Kein Wurf zum Rückgängigmachen', true); return; }
        liveState = await r.json();
        renderState(liveState);
        showToast('Letzter Wurf rückgängig');
      } catch(e) { showToast('Netzwerkfehler', true); }
    }

    // ── Next Player ──
    async function nextPlayer() {
      try {
        var r = await fetch('/api/live/next-player', { method: 'POST' });
        if (!r.ok) { showToast('Fehler', true); return; }
        liveState = await r.json();
        renderState(liveState);
        showToast('Nächster Spieler');
      } catch(e) { showToast('Netzwerkfehler', true); }
    }

    async function changeMode(mode) {
      try {
        var r = await fetch('/api/game/mode', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode }) });
        if (!r.ok) { showToast('Modus-Wechsel fehlgeschlagen', true); return; }
        liveState = await r.json();
        renderState(liveState);
        showToast('Modus: ' + mode);
        loadHighscoresOnly();
      } catch(e) { showToast('Netzwerkfehler', true); }
    }

    // ── Reset ──
    async function resetLeg(carryLegs) {
      try {
        var r = await fetch('/api/live/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ carryLegs: carryLegs })
        });
        if (!r.ok) { showToast('Reset fehlgeschlagen', true); return; }
        liveState = await r.json();
        renderState(liveState);
        showToast(carryLegs ? 'Neues Leg gestartet (Legs erhalten)' : 'Spiel zurückgesetzt');
        loadHighscoresOnly();
      } catch(e) { showToast('Netzwerkfehler', true); }
    }

    // ── Highscores separat laden ──
    async function loadHighscoresOnly() {
      try {
        var r = await fetch('/api/highscores');
        if (r.ok) renderHighscores(await r.json());
      } catch {}
    }
  </script>
</body>
</html>
