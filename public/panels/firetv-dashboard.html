<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Fire TV Start</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909;
      --line: #262626;
      --text: #f4f4f4;
      --muted: #808080;
      --live: #e63946;
      --players: #457b9d;
      --scores: #f4a261;
      --scale: 1;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(230,57,70,.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(69,123,157,.14), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    body.rotate-mode::after {
      content: 'ROTATION';
      position: fixed;
      top: 8px;
      right: 10px;
      z-index: 50;
      font-size: .62rem;
      letter-spacing: .14em;
      color: #9a9a9a;
      background: rgba(8,8,8,.72);
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 3px 8px;
    }
    .shell {
      width: 100vw;
      height: 100vh;
      padding: calc(22px * var(--scale));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: calc(18px * var(--scale));
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: calc(12px * var(--scale)) calc(16px * var(--scale));
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(16,16,16,.94);
    }
    .title-wrap { flex: 1; }
    .topbar h1 { font-size: calc(1.5rem * var(--scale)); font-weight: 900; letter-spacing: .02em; }
    .topbar p { color: var(--muted); font-size: calc(.9rem * var(--scale)); margin-top: 4px; }
    .clock {
      font-size: calc(1.15rem * var(--scale));
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 110px;
      text-align: right;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: calc(18px * var(--scale));
      min-height: 0;
    }
    .card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100%;
      padding: calc(26px * var(--scale));
      border-radius: calc(26px * var(--scale));
      text-decoration: none;
      color: inherit;
      border: 2px solid var(--accent, #333);
      background: linear-gradient(180deg, rgba(27,27,27,.98), rgba(17,17,17,.98));
      box-shadow: 0 16px 40px rgba(0,0,0,.32);
      outline: none;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, opacity .2s ease;
    }
    .card:focus,
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 44px rgba(0,0,0,.42);
      border-color: #fff;
    }
    .card:focus-visible {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,.18), 0 20px 44px rgba(0,0,0,.42);
    }
    body.rotate-mode .card {
      opacity: .5;
      transform: scale(.985);
    }
    body.rotate-mode .card.spotlight {
      opacity: 1;
      transform: translateY(-2px) scale(1.015);
      border-color: #fff;
      box-shadow: 0 22px 46px rgba(0,0,0,.45);
    }
    .card-top { display: grid; gap: 14px; }
    .icon {
      width: calc(78px * var(--scale));
      height: calc(78px * var(--scale));
      border-radius: calc(18px * var(--scale));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(2.15rem * var(--scale));
      background: var(--icon-bg, rgba(255,255,255,.08));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .title { font-size: calc(1.95rem * var(--scale)); font-weight: 900; line-height: 1.04; }
    .desc {
      color: #b7b7b7;
      font-size: calc(1.05rem * var(--scale));
      line-height: 1.5;
      max-width: 24ch;
    }
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: calc(16px * var(--scale));
      color: var(--accent, #ccc);
      font-size: calc(.9rem * var(--scale));
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .arrow { color: #f0f0f0; font-size: calc(1.45rem * var(--scale)); line-height: 1; }
    .bottom-note {
      text-align: center;
      color: #6f6f6f;
      font-size: calc(.8rem * var(--scale));
      letter-spacing: .04em;
    }
    .hidden { display: none !important; }
    @media (max-width: 1100px), (max-height: 860px) {
      .shell { padding: 16px; gap: 12px; }
      .topbar { padding: 10px 12px; border-radius: 14px; }
      .topbar h1 { font-size: 1.28rem; }
      .topbar p { font-size: .82rem; margin-top: 2px; }
      .clock { font-size: 1rem; }
      .grid { gap: 10px; }
      .card { padding: 16px; border-radius: 18px; }
      .card-top { gap: 10px; }
      .icon { width: 54px; height: 54px; border-radius: 14px; font-size: 1.5rem; }
      .title { font-size: 1.35rem; }
      .desc { font-size: .84rem; line-height: 1.35; }
      .card-foot { margin-top: 10px; font-size: .76rem; }
      .bottom-note { font-size: .7rem; }
    }

    @media (width: 1024px) and (height: 860px) {
      .shell { padding: 16px; gap: 10px; }
      .topbar { padding: 10px 12px; }
      .grid { gap: 10px; }
      .card { padding: 16px; }
      .title { font-size: 1.32rem; }
      .desc { font-size: .82rem; }
      .bottom-note { font-size: .68rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1>📺 Fire TV Start</h1>
        <p>Nur Live, Spieler und Highscores - kontrolliert im Browser, angezeigt auf dem TV.</p>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </header>

    <main class="grid" id="grid"></main>

    <div class="bottom-note">Browser bleibt die Konfiguration - Fire TV bleibt die reine Anzeige.</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(location.search);
    const rotateMode = urlParams.get('rotate') === '1';
    let rotateTimer = null;
    let rotateIndex = 0;

    if (rotateMode) {
      document.body.classList.add('rotate-mode');
    }

    const CARD_DATA = {
      live: {
        href: '/panels/live-spielstand.html?tv=1',
        icon: '⚡',
        title: 'Live-Spielstand',
        desc: 'Aktuelles Spiel, aktiver Spieler, Wuerfe und Restpunkte.',
        label: 'Live',
        accent: 'var(--live)',
        iconBg: 'rgba(230,57,70,.16)'
      },
      spieler: {
        href: '/panels/spieler.html?tv=1',
        icon: '👤',
        title: 'Spieler',
        desc: 'Aktive Spieler, Reihenfolge und Namen auf einen Blick.',
        label: 'Spieler',
        accent: 'var(--players)',
        iconBg: 'rgba(69,123,157,.16)'
      },
      highscores: {
        href: '/panels/highscores.html?tv=1',
        icon: '🏆',
        title: 'Highscores',
        desc: 'Bestleistungen, Spezialwerte und Ranglisten fuer den TV.',
        label: 'Scores',
        accent: 'var(--scores)',
        iconBg: 'rgba(244,162,97,.16)'
      }
    };

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateClock() {
      const clock = document.getElementById('clock');
      if (!clock.classList.contains('hidden')) {
        clock.textContent = new Date().toLocaleTimeString('de-DE');
      }
    }

    function applySettings(settings) {
      const scale = Math.max(80, Math.min(130, Number(settings.firetvUiScale || 100) || 100));
      document.body.style.setProperty('--scale', String(scale / 100));
      document.getElementById('clock').classList.toggle('hidden', settings.firetvShowClock === false);

      const orderRaw = String(settings.firetvTileOrder || 'live,spieler,highscores');
      const order = orderRaw.split(',').map((entry) => entry.trim().toLowerCase()).filter(Boolean);
      const finalOrder = order.filter((key) => CARD_DATA[key]).concat(Object.keys(CARD_DATA).filter((key) => !order.includes(key)));
      const grid = document.getElementById('grid');
      grid.innerHTML = finalOrder.map((key) => {
        const card = CARD_DATA[key];
        return '<a class="card" href="' + card.href + '" style="--accent:' + card.accent + ';--icon-bg:' + card.iconBg + '">' +
          '<div class="card-top">' +
            '<div class="icon">' + card.icon + '</div>' +
            '<div class="title">' + escapeHtml(card.title) + '</div>' +
            '<div class="desc">' + escapeHtml(card.desc) + '</div>' +
          '</div>' +
          '<div class="card-foot"><span>' + escapeHtml(card.label) + '</span><span class="arrow">→</span></div>' +
        '</a>';
      }).join('');

      if (rotateMode) {
        enableRotateMode();
      }
    }

    function enableRotateMode() {
      if (rotateTimer) {
        clearInterval(rotateTimer);
        rotateTimer = null;
      }
      const cards = Array.from(document.querySelectorAll('.card'));
      if (cards.length === 0) return;

      const showSpotlight = () => {
        cards.forEach((card, idx) => card.classList.toggle('spotlight', idx === rotateIndex));
        rotateIndex = (rotateIndex + 1) % cards.length;
      };

      showSpotlight();
      rotateTimer = setInterval(showSpotlight, 8000);
    }

    async function loadSettings() {
      try {
        const settings = await fetch('/api/settings').then((r) => r.json());
        applySettings(settings || {});
      } catch (_) {
        applySettings({});
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadSettings();
  </script>
</body>
</html>
