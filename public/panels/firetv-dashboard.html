<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Fire TV Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909;
      --panel: #141414;
      --panel-soft: #101010;
      --line: #242424;
      --text: #f1f1f1;
      --muted: #767676;
      --accent: #f4a261;
      --good: #2a9d8f;
      --danger: #e63946;
    }
    body {
      background:
        radial-gradient(circle at top left, rgba(244,162,97,.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(69,123,157,.14), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }
    .shell {
      width: 100vw;
      height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1.1fr auto auto;
      gap: 10px;
      align-items: center;
      background: rgba(17,17,17,.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 16px;
      min-height: 72px;
    }
    .brand h1 { font-size: 1.28rem; font-weight: 800; letter-spacing: .02em; }
    .brand p { color: var(--muted); font-size: .8rem; margin-top: 4px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: .84rem;
      color: #d9d9d9;
      background: rgba(255,255,255,.02);
      white-space: nowrap;
    }
    .pill strong { color: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(290px, .82fr);
      gap: 12px;
      min-height: 0;
    }
    .focus {
      background: linear-gradient(180deg, rgba(22,22,22,.98), rgba(16,16,16,.98));
      border: 2px solid var(--pc, #457b9d);
      border-radius: 24px;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      min-height: 0;
      box-shadow: 0 0 40px rgba(0,0,0,.28);
    }
    .focus-head h2 { font-size: 2rem; font-weight: 900; line-height: 1; }
    .focus-head p { color: var(--muted); font-size: .95rem; margin-top: 6px; }
    .focus-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      gap: 12px;
    }
    .tile {
      background: rgba(8,8,8,.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 176px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .tile h3 {
      color: #888;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      margin-bottom: 12px;
    }
    .throw-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .throw-box {
      min-height: 88px;
      border-radius: 14px;
      border: 1px solid #303030;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }
    .throw-box .num { font-size: clamp(2rem, 3.6vw, 2.8rem); font-weight: 900; line-height: 1; color: var(--pc, var(--accent)); }
    .throw-box .pts { font-size: .92rem; color: #808080; margin-top: 6px; }
    .tile-sub { margin-top: 10px; color: #8c8c8c; font-size: .92rem; }
    .tile-value { font-size: clamp(4rem, 7vw, 5.8rem); font-weight: 900; line-height: 1; color: var(--pc, #6da7d7); }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .summary-card {
      background: rgba(17,17,17,.95);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
    }
    .summary-card span { display: block; color: #7d7d7d; font-size: .7rem; text-transform: uppercase; letter-spacing: .12em; }
    .summary-card strong { display: block; margin-top: 4px; font-size: 1.65rem; }
    .side {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }
    .panel {
      background: rgba(17,17,17,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel h3 {
      color: #888;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      margin-bottom: 10px;
      text-align: center;
    }
    .player-list, .hs-list {
      display: grid;
      gap: 8px;
      overflow: hidden auto;
      padding-right: 2px;
    }
    .player-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid #262626;
      background: #171717;
      border-radius: 14px;
      padding: 10px 12px;
    }
    .slot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 800;
      background: var(--pc, #333);
      color: #fff;
    }
    .player-meta strong { display: block; font-size: 1rem; }
    .player-meta span { display: block; color: #848484; font-size: .76rem; margin-top: 2px; }
    .player-score { text-align: right; }
    .player-score strong { display: block; font-size: 2rem; color: var(--pc, var(--accent)); line-height: 1; }
    .player-score span { display: block; color: #7f7f7f; font-size: .76rem; margin-top: 4px; }
    .hs-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 9px 10px;
    }
    .hs-rank { color: #8a8a8a; font-size: .82rem; font-weight: 700; }
    .hs-player { font-size: .92rem; }
    .hs-player span { display: block; color: #6f6f6f; font-size: .72rem; margin-top: 2px; }
    .hs-score { font-size: 1.18rem; font-weight: 800; color: var(--accent); }
    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: .9rem;
      text-align: center;
      padding: 20px;
    }
    @media (max-width: 1024px), (max-height: 860px) {
      .shell { padding: 12px; gap: 10px; }
      .topbar { padding: 10px 14px; min-height: 64px; }
      .brand h1 { font-size: 1.14rem; }
      .brand p { font-size: .74rem; }
      .layout { gap: 10px; }
      .focus { padding: 14px; gap: 10px; }
      .focus-head h2 { font-size: 1.7rem; }
      .focus-head p { font-size: .84rem; }
      .focus-grid { gap: 10px; }
      .tile { min-height: 150px; padding: 12px; }
      .throw-box { min-height: 74px; }
      .throw-box .num { font-size: clamp(1.7rem, 3vw, 2.2rem); }
      .tile-sub { font-size: .82rem; }
      .tile-value { font-size: clamp(3.3rem, 6vw, 4.8rem); }
      .summary-card strong { font-size: 1.35rem; }
      .panel { padding: 12px; }
      .player-row { padding: 8px 10px; }
      .player-score strong { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Live Dart TV</h1>
        <p id="tvStatus">Verbunden · warte auf Live-Daten</p>
      </div>
      <div class="pill" id="modePill">Modus: <strong>-</strong></div>
      <div class="pill" id="clockPill">--:--:--</div>
    </header>

    <div class="layout">
      <main class="focus" id="focusView">
        <div class="empty">Lade Live-Spielstand...</div>
      </main>

      <aside class="side">
        <section class="panel">
          <h3>Spieler</h3>
          <div class="player-list" id="playerList"></div>
        </section>
        <section class="panel">
          <h3>Highscores</h3>
          <div class="hs-list" id="highscoreList"></div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    let liveState = null;

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/#/g, '%23');
    }

    function colorToRgba(hex, alpha) {
      const value = String(hex || '#457b9d').replace('#', '').trim();
      if (value.length !== 6) return 'rgba(69,123,157,' + alpha + ')';
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function updateClock() {
      document.getElementById('clockPill').textContent = new Date().toLocaleTimeString('de-DE');
    }

    function getLegPointsForPlayer(player, state) {
      const mode = String((state && state.game && state.game.mode) || '');
      const numericMode = Number(mode);
      const startScore = Number.isFinite(numericMode) && numericMode > 0 ? numericMode : 0;
      if (startScore > 0) {
        const remaining = Math.max(0, Number(player && player.remaining || startScore));
        return Math.max(0, startScore - remaining);
      }
      return Math.max(0, Number(player && player.totalScored || 0));
    }

    function renderFocus(state) {
      const players = Array.isArray(state.players) ? state.players : [];
      if (players.length === 0) {
        document.getElementById('focusView').innerHTML = '<div class="empty">Keine aktiven Spieler vorhanden.</div>';
        return;
      }

      const activeIndex = Number.isInteger(state.game.activePlayer) ? state.game.activePlayer : 0;
      const player = players[activeIndex] || players[0];
      const currentRound = Array.isArray(player.currentRoundPoints) ? [...player.currentRoundPoints] : [];
      const lastThrows = Array.isArray(player.throws) ? player.throws.slice(-3).map((item) => item.points) : [];
      const displayThrows = currentRound.length > 0 ? currentRound : lastThrows;
      while (displayThrows.length < 3) displayThrows.push(null);
      const currentRoundScore = displayThrows.reduce((sum, value) => sum + (value == null ? 0 : Number(value) || 0), 0);
      const average = Number(player.average || 0) > 0 ? Number(player.average).toFixed(1) : '-';
      const legScore = getLegPointsForPlayer(player, state);

      const throwHtml = displayThrows.map((value) => {
        const label = value == null ? '-' : String(value);
        const pointsLabel = value == null ? 'offen' : (Number(value) > 0 ? '+' + value : '0');
        return '<div class="throw-box">' +
          '<div class="num">' + escapeHtml(label) + '</div>' +
          '<div class="pts">' + escapeHtml(pointsLabel) + '</div>' +
        '</div>';
      }).join('');

      document.getElementById('focusView').style.setProperty('--pc', player.color || '#457b9d');
      document.getElementById('focusView').style.boxShadow = '0 0 40px ' + colorToRgba(player.color || '#457b9d', .18);
      document.getElementById('focusView').innerHTML = '' +
        '<div class="focus-head">' +
          '<h2>🎯 ' + escapeHtml(player.name) + '</h2>' +
          '<p>Spieler ' + escapeHtml(player.slot) + ' wirft gerade · Runde ' + escapeHtml(state.game.throwRound || 1) + ' · Wurf ' + escapeHtml((state.game.currentThrow || 0) + 1) + ' von 3</p>' +
        '</div>' +
        '<div class="focus-grid">' +
          '<section class="tile">' +
            '<h3>Aktuelle Würfe</h3>' +
            '<div class="throw-row">' + throwHtml + '</div>' +
            '<div class="tile-sub">Runden-Punkte: <strong>' + currentRoundScore + '</strong></div>' +
          '</section>' +
          '<section class="tile">' +
            '<h3>Punkte im Leg</h3>' +
            '<div class="tile-value">' + legScore + '</div>' +
            '<div class="tile-sub">Seit Start dieses Legs</div>' +
          '</section>' +
          '<section class="tile">' +
            '<h3>Rest</h3>' +
            '<div class="tile-value">' + escapeHtml(player.remaining) + '</div>' +
            '<div class="tile-sub">Offene Punkte</div>' +
          '</section>' +
        '</div>' +
        '<div></div>' +
        '<div class="summary">' +
          '<div class="summary-card"><span>Turns</span><strong>' + escapeHtml(player.turns || 0) + '</strong></div>' +
          '<div class="summary-card"><span>Gesamt Punkte</span><strong>' + escapeHtml(player.totalScored || 0) + '</strong></div>' +
          '<div class="summary-card"><span>Ø 3-Dart</span><strong>' + escapeHtml(average) + '</strong></div>' +
        '</div>';
    }

    function renderPlayers(state) {
      const players = Array.isArray(state.players) ? state.players : [];
      const activeIndex = Number.isInteger(state.game.activePlayer) ? state.game.activePlayer : 0;
      const others = players.filter((_player, index) => index !== activeIndex);
      const playerList = document.getElementById('playerList');
      if (others.length === 0) {
        playerList.innerHTML = '<div class="empty">Keine weiteren Spieler aktiv.</div>';
        return;
      }

      playerList.innerHTML = others.map((player) => {
        const average = Number(player.average || 0) > 0 ? Number(player.average).toFixed(1) : '-';
        return '<div class="player-row" style="--pc:' + escapeAttr(player.color || '#f4a261') + '">' +
          '<div class="slot">' + escapeHtml(player.slot) + '</div>' +
          '<div class="player-meta"><strong>' + escapeHtml(player.name) + '</strong><span>Ø 3-Dart: ' + escapeHtml(average) + ' · Legs: ' + escapeHtml(player.legs || 0) + '</span></div>' +
          '<div class="player-score"><strong>' + escapeHtml(player.remaining) + '</strong><span>Rest</span></div>' +
        '</div>';
      }).join('');
    }

    function renderHighscores(highscores) {
      const list = document.getElementById('highscoreList');
      const rows = Array.isArray(highscores) ? highscores.slice(0, 8) : [];
      if (rows.length === 0) {
        list.innerHTML = '<div class="empty">Noch keine Highscores vorhanden.</div>';
        return;
      }

      list.innerHTML = rows.map((entry, index) => {
        const kind = entry.kind || 'Score';
        return '<div class="hs-row">' +
          '<div class="hs-rank">#' + (index + 1) + '</div>' +
          '<div class="hs-player">' + escapeHtml(entry.player || '-') + '<span>' + escapeHtml(kind) + '</span></div>' +
          '<div class="hs-score">' + escapeHtml(entry.score || 0) + '</div>' +
        '</div>';
      }).join('');
    }

    function renderState(state, highscores) {
      if (!state || !state.game) return;
      liveState = state;
      document.getElementById('modePill').innerHTML = 'Modus: <strong>' + escapeHtml(state.game.mode || '-') + '</strong>';
      document.getElementById('tvStatus').textContent = 'Verbunden · Live-Ansicht fuer Fire TV';
      renderFocus(state);
      renderPlayers(state);
      renderHighscores(highscores);
    }

    async function loadAll() {
      try {
        const [stateRes, highscoreRes] = await Promise.all([
          fetch('/api/live/state'),
          fetch('/api/highscores').catch(() => null)
        ]);
        if (!stateRes.ok) throw new Error('HTTP ' + stateRes.status);
        const state = await stateRes.json();
        const highscores = highscoreRes && highscoreRes.ok ? await highscoreRes.json() : [];
        renderState(state, highscores);
      } catch (_err) {
        document.getElementById('focusView').innerHTML = '<div class="empty">Live-State aktuell nicht erreichbar.</div>';
        document.getElementById('playerList').innerHTML = '<div class="empty">Keine Daten</div>';
        document.getElementById('highscoreList').innerHTML = '<div class="empty">Keine Daten</div>';
        document.getElementById('tvStatus').textContent = 'Verbindung getrennt';
      }
    }

    (function() {
      const sse = new EventSource('/api/events');
      let reloadQueued = false;
      sse.addEventListener('reload', () => {
        if (reloadQueued) return;
        reloadQueued = true;
        setTimeout(() => {
          reloadQueued = false;
          loadAll();
        }, 80);
      });
      sse.addEventListener('error', () => {
        document.getElementById('tvStatus').textContent = 'SSE getrennt · warte auf Neuverbindung';
      });
    })();

    updateClock();
    setInterval(updateClock, 1000);
    loadAll();
  </script>
</body>
</html>
