<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Löwen Dart - LIVE Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909;
      --line: #262626;
      --text: #f4f4f4;
      --muted: #808080;
      --live: #e63946;
      --players: #457b9d;
      --scores: #f4a261;
      --scale: 1;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(230,57,70,.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(69,123,157,.14), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    body.rotate-mode::after {
      content: 'ROTATION';
      position: fixed;
      top: 8px;
      right: 10px;
      z-index: 50;
      font-size: .62rem;
      letter-spacing: .14em;
      color: #9a9a9a;
      background: rgba(8,8,8,.72);
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 3px 8px;
    }
    .shell {
      width: 100vw;
      height: 100vh;
      padding: calc(22px * var(--scale));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: calc(18px * var(--scale));
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: calc(12px * var(--scale)) calc(16px * var(--scale));
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(16,16,16,.94);
    }
    .title-wrap { flex: 1; }
    .topbar h1 { font-size: calc(1.5rem * var(--scale)); font-weight: 900; letter-spacing: .02em; }
    .topbar p { color: var(--muted); font-size: calc(.9rem * var(--scale)); margin-top: 4px; }
    .clock {
      font-size: calc(1.15rem * var(--scale));
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 110px;
      text-align: right;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: calc(18px * var(--scale));
      min-height: 0;
      align-content: start;
    }
    .card {
      position: relative;
      background: #161616;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 22px 18px 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 164px;
      overflow: hidden;
      cursor: pointer;
      outline: none;
      transition: transform .18s, box-shadow .18s, border-color .18s, opacity .2s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent, #444);
    }
    .card:focus,
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,.55);
      border-color: var(--accent, #444);
    }
    .card:focus-visible {
      border-color: var(--accent, #444);
      box-shadow: 0 0 0 3px rgba(255,255,255,.14), 0 12px 36px rgba(0,0,0,.55);
    }
    body.rotate-mode .card {
      opacity: .5;
      transform: scale(.985);
    }
    body.rotate-mode .card.spotlight {
      opacity: 1;
      transform: translateY(-2px) scale(1.015);
      border-color: var(--accent, #444);
      box-shadow: 0 14px 34px rgba(0,0,0,.55);
    }
    .card-icon { font-size: 2rem; line-height: 1; }
    .card-title { font-size: 1rem; font-weight: 700; }
    .card-desc { font-size: .75rem; color: #888; line-height: 1.45; flex: 1; }
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .badge {
      font-size: .67rem;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 700;
      background: var(--accent-bg, #1e1e1e);
      color: var(--accent, #888);
    }
    .arrow { font-size: .95rem; opacity: .4; transition: opacity .2s, transform .2s; }
    .card:hover .arrow { opacity: 1; transform: translateX(4px); }
    .bottom-note {
      text-align: center;
      color: #6f6f6f;
      font-size: calc(.8rem * var(--scale));
      letter-spacing: .04em;
    }
    .hidden { display: none !important; }
    @media (max-width: 1100px), (max-height: 860px) {
      .shell { padding: 16px; gap: 12px; }
      .topbar { padding: 10px 12px; border-radius: 14px; }
      .topbar h1 { font-size: 1.28rem; }
      .topbar p { font-size: .82rem; margin-top: 2px; }
      .clock { font-size: 1rem; }
      .grid { gap: 10px; }
      .card { padding: 18px 14px 12px; border-radius: 12px; min-height: 142px; }
      .card-icon { font-size: 1.5rem; }
      .card-title { font-size: .9rem; }
      .card-desc { font-size: .72rem; }
      .bottom-note { font-size: .7rem; }
    }

    @media (width: 1024px) and (height: 860px) {
      .shell { padding: 16px; gap: 10px; }
      .topbar { padding: 10px 12px; }
      .grid { gap: 10px; }
      .card { padding: 18px 14px 12px; min-height: 136px; }
      .card-title { font-size: .9rem; }
      .card-desc { font-size: .72rem; }
      .bottom-note { font-size: .68rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1>📺 Löwen Dart - LIVE Dashboard</h1>
        <p>Nur Live-Dart, Spieler und Highscores.</p>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </header>

    <main class="grid" id="grid"></main>

    <div class="bottom-note">LIVE Dashboard: nur Anzeige mit 3 Panels.</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(location.search);
    const rotateMode = urlParams.get('rotate') === '1';
    let rotateTimer = null;
    let rotateIndex = 0;

    if (rotateMode) {
      document.body.classList.add('rotate-mode');
    }

    const CARD_DATA = {
      live: {
        href: '/panels/live-spielstand-tv.html',
        icon: '⚡',
        title: 'Live-Spielstand',
        desc: 'Aktuelles Spiel, aktiver Spieler, Wuerfe und Restpunkte.',
        label: 'Live',
        accent: 'var(--live)',
        badgeBg: '#1f0b0d'
      },
      spieler: {
        href: '/panels/spieler.html',
        icon: '👤',
        title: 'Spieler',
        desc: 'Aktive Spieler, Reihenfolge und Namen auf einen Blick.',
        label: 'Verwaltung',
        accent: 'var(--players)',
        badgeBg: '#0d1520'
      },
      highscores: {
        href: '/panels/highscores.html',
        icon: '🏆',
        title: 'Highscores',
        desc: 'Bestleistungen, Spezialwerte und Ranglisten fuer den TV.',
        label: 'Ranglisten',
        accent: 'var(--scores)',
        badgeBg: '#1e1208'
      }
    };

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateClock() {
      const clock = document.getElementById('clock');
      if (!clock.classList.contains('hidden')) {
        clock.textContent = new Date().toLocaleTimeString('de-DE');
      }
    }

    function applySettings(settings) {
      const scale = Math.max(80, Math.min(130, Number(settings.firetvUiScale || 100) || 100));
      document.body.style.setProperty('--scale', String(scale / 100));
      document.getElementById('clock').classList.toggle('hidden', settings.firetvShowClock === false);

      const orderRaw = String(settings.firetvTileOrder || 'live,spieler,highscores');
      const order = orderRaw.split(',').map((entry) => entry.trim().toLowerCase()).filter(Boolean);
      const finalOrder = order.filter((key) => CARD_DATA[key]).concat(Object.keys(CARD_DATA).filter((key) => !order.includes(key)));
      const grid = document.getElementById('grid');
      grid.innerHTML = finalOrder.map((key) => {
        const card = CARD_DATA[key];
        return '<a class="card" href="' + card.href + '" style="--accent:' + card.accent + ';--accent-bg:' + card.badgeBg + '">' +
            '<span class="card-icon">' + card.icon + '</span>' +
            '<span class="card-title">' + escapeHtml(card.title) + '</span>' +
            '<span class="card-desc">' + escapeHtml(card.desc) + '</span>' +
          '<div class="card-foot"><span class="badge">' + escapeHtml(card.label) + '</span><span class="arrow">→</span></div>' +
        '</a>';
      }).join('');

      if (rotateMode) {
        enableRotateMode();
      }
    }

    function enableRotateMode() {
      if (rotateTimer) {
        clearInterval(rotateTimer);
        rotateTimer = null;
      }
      const cards = Array.from(document.querySelectorAll('.card'));
      if (cards.length === 0) return;

      const showSpotlight = () => {
        cards.forEach((card, idx) => card.classList.toggle('spotlight', idx === rotateIndex));
        rotateIndex = (rotateIndex + 1) % cards.length;
      };

      showSpotlight();
      rotateTimer = setInterval(showSpotlight, 8000);
    }

    async function loadSettings() {
      try {
        const settings = await fetch('/api/settings').then((r) => r.json());
        applySettings(settings || {});
      } catch (_) {
        applySettings({});
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadSettings();
  </script>
</body>
</html>
