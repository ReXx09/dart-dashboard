<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rangliste</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f1f1f1; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .topbar { background: #1a1a1a; border-bottom: 2px solid #2a9d8f; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
    .topbar a { color: #888; text-decoration: none; font-size: 0.9rem; }
    .topbar a:hover { color: #fff; }
    .topbar h2 { font-size: 1.3rem; }
    main { padding: 32px; max-width: 800px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    th { background: #222; padding: 12px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
    td { padding: 12px 16px; border-bottom: 1px solid #222; }
    tr:hover td { background: #1a1a1a; }
    .pos-1 td:first-child { color: gold; font-weight: 700; }
    .pos-2 td:first-child { color: silver; font-weight: 700; }
    .pos-3 td:first-child { color: #cd7f32; font-weight: 700; }
    .pts { color: #2a9d8f; font-weight: 700; }
    .placeholder { background: #1a1a1a; border-radius: 12px; padding: 32px; text-align: center; border: 2px dashed #2a9d8f; color: #888; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">← Zurück</a>
    <h2>🏆 Rangliste</h2>
  </div>
  <main>
    <table>
      <thead>
        <tr><th>Platz</th><th>Spieler</th><th>Sp.</th><th>S</th><th>N</th><th>Punkte</th></tr>
      </thead>
      <tbody>
        <tr class="pos-1"><td>🥇 1</td><td>Max Mustermann</td><td>24</td><td>18</td><td>6</td><td class="pts">54</td></tr>
        <tr class="pos-2"><td>🥈 2</td><td>Lisa Schmidt</td><td>22</td><td>15</td><td>7</td><td class="pts">45</td></tr>
        <tr class="pos-3"><td>🥉 3</td><td>Tom Bauer</td><td>20</td><td>12</td><td>8</td><td class="pts">36</td></tr>
        <tr><td>4</td><td>Anna Müller</td><td>18</td><td>9</td><td>9</td><td class="pts">27</td></tr>
      </tbody>
    </table>
    <div class="placeholder">Echte Ranglisten-Daten werden hier geladen, sobald die API verbunden ist.</div>
  </main>
</body>
</html>
