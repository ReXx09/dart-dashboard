<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Löwen Dart Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#f1f1f1;font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
    header{background:#111;border-bottom:3px solid #e63946;padding:14px 28px;display:flex;align-items:center;gap:14px;flex-shrink:0}
    .logo{font-size:1.6rem}
    header h1{font-size:1.2rem;font-weight:700}
    header .sub{font-size:.75rem;color:#555;margin-top:2px}
    .back-link{color:#666;text-decoration:none;font-size:.82rem;padding:7px 14px;border:1px solid #252525;border-radius:8px;transition:color .2s,border-color .2s;white-space:nowrap;margin-left:auto}
    .back-link:hover{color:#f1f1f1;border-color:#555}
    main{flex:1;padding:28px;max-width:800px;margin:0 auto;width:100%}

    .section{margin-bottom:28px}
    .sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .sec-title{font-size:.72rem;text-transform:uppercase;letter-spacing:3px;color:#444;font-weight:600;white-space:nowrap}
    .sec-line{flex:1;height:1px;background:#1a1a1a}

    fieldset{background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:18px 20px;margin-bottom:12px}
    legend{font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;color:#888;font-weight:600;padding:0 8px}
    .field-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
    .field-row label{font-size:.82rem;color:#888;min-width:130px}
    .field-row input,.field-row select{background:#0d0d0d;border:1px solid #2a2a2a;color:#f1f1f1;padding:8px 12px;border-radius:8px;font-size:.88rem;font-family:inherit;width:220px}
    .field-row input:focus,.field-row select:focus{border-color:#e63946;outline:none}
    .field-row input[type="checkbox"]{width:18px;height:18px;cursor:pointer}
    .field-hint{font-size:.72rem;color:#444;margin-left:142px;margin-top:-4px;margin-bottom:8px}

    .btn-save{background:#e63946;border:none;color:#fff;padding:9px 24px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;font-family:inherit;transition:background .2s}
    .btn-save:hover{background:#c1121f}
    .btn-save:disabled{background:#333;color:#555;cursor:default}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;border:1px solid #2a9d8f;color:#f1f1f1;padding:10px 24px;border-radius:8px;font-size:.88rem;opacity:0;transition:all .3s;z-index:999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.err{border-color:#e63946}

    .status-info{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.82rem}
    .status-info .label{color:#555}
    .status-info .value{color:#ddd;text-align:right;font-family:monospace}
  </style>
</head>
<body>
<header>
  <span class="logo">⚙</span>
  <div>
    <h1>Live Dashboard – Admin</h1>
    <div class="sub">Arduino &amp; Server-Konfiguration</div>
  </div>
  <a href="/" class="back-link">← Zurück</a>
</header>
<main>
  <div class="section">
    <div class="sec-hd"><span class="sec-title">Server-Status</span><div class="sec-line"></div></div>
    <div class="status-info" id="serverInfo">
      <span class="label">IP:</span><span class="value" id="si-ip">-</span>
      <span class="label">Port:</span><span class="value" id="si-port">-</span>
      <span class="label">Datenbank:</span><span class="value" id="si-db">-</span>
      <span class="label">Arduino:</span><span class="value" id="si-ard">-</span>
    </div>
  </div>

  <div class="section">
    <div class="sec-hd"><span class="sec-title">Arduino-Einstellungen</span><div class="sec-line"></div></div>
    <fieldset>
      <div class="field-row">
        <label>Serial-Überwachung</label>
        <input type="checkbox" id="ardEnabled" />
      </div>
      <div class="field-row">
        <label>Port</label>
        <input type="text" id="ardPort" placeholder="Auto (leer lassen)" />
      </div>
      <div class="field-hint">Leer lassen = automatische Erkennung (z.B. /dev/ttyACM0, COM3)</div>
      <div class="field-row">
        <label>Baudrate</label>
        <select id="ardBaud">
          <option value="9600">9600</option>
          <option value="19200">19200</option>
          <option value="38400">38400</option>
          <option value="57600">57600</option>
          <option value="115200" selected>115200</option>
          <option value="250000">250000</option>
        </select>
      </div>
      <button class="btn-save" id="saveArdBtn">Speichern</button>
    </fieldset>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
  const toast = document.getElementById('toast');
  function showToast(msg, isError) {
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' err' : '');
    setTimeout(() => toast.className = 'toast', 2500);
  }

  async function load() {
    try {
      const [info, settings, storage] = await Promise.all([
        fetch('/api/server-info').then(r => r.json()),
        fetch('/api/settings').then(r => r.json()),
        fetch('/api/storage/info').then(r => r.json())
      ]);
      document.getElementById('si-ip').textContent = info.ip;
      document.getElementById('si-port').textContent = info.port;
      document.getElementById('si-db').textContent = storage.client + (storage.external ? ' (extern)' : ' (lokal)');
      document.getElementById('ardEnabled').checked = settings.arduinoMonitorEnabled !== false;
      document.getElementById('ardPort').value = settings.arduinoPort || '';
      document.getElementById('ardBaud').value = String(settings.arduinoBaudRate || 115200);
    } catch(e) {
      document.getElementById('si-ip').textContent = 'Offline';
    }
    try {
      const ard = await fetch('/api/arduino/state').then(r => r.json());
      const connection = ard.connection || ard;
      document.getElementById('si-ard').textContent = connection.connected ? 'Verbunden (' + (connection.port||'?') + ')' : 'Getrennt';
    } catch(e) { document.getElementById('si-ard').textContent = '?'; }
  }

  document.getElementById('saveArdBtn').addEventListener('click', async function() {
    this.disabled = true;
    const settings = {
      arduinoMonitorEnabled: document.getElementById('ardEnabled').checked,
      arduinoPort: document.getElementById('ardPort').value.trim(),
      arduinoBaudRate: parseInt(document.getElementById('ardBaud').value, 10)
    };
    try {
      const r = await fetch('/api/settings', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(settings)
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      showToast('Einstellungen gespeichert. Arduino-Monitor neu gestartet.');
    } catch(e) {
      showToast('Fehler: ' + e.message, true);
    }
    this.disabled = false;
  });

  load();
</script>
</body>
</html>
